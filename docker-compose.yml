services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      DB_PATH: "/data/resolvent.db"
    volumes:
      - db_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy

networks:
  internal:
    driver: bridge

volumes:
  db_data:
